# Example config for the time-window-pruned stereo MILP solver (Phase 3).

# Access-interval search coarse step (seconds). Smaller values are more accurate but slower.
time_step_s: 60

# Candidate time sampling stride within an access interval (seconds).
sample_stride_s: 30

# Max candidates to keep per (satellite, target, access_interval).
max_candidates_per_interval: 20

# Steering grid samples along/across track. Total grid points <= along * across
# after filtering by combined off-nadir limit.
steering_along_samples: 3
steering_across_samples: 3

# Strip polyline sampling step for overlap estimation (seconds).
strip_sample_step_s: 8.0

# Deterministic polar-grid overlap estimator.
overlap_grid_angles: 8
overlap_grid_radii: 3
overlap_approximation: polar_grid_area_uniform

# Phase 3: Time-window cluster pruning (Kim-style adaptation)
pruning:
  enabled: true
  # Cluster temporal gap (seconds). "auto" = (4 * max_off_nadir) / max_slew_velocity + settling_time.
  cluster_gap_s: auto
  # Max candidates to retain per cluster. "auto" = lambda lower bound from avg obs duration + settle.
  max_candidates_per_cluster: auto
  # Hard floor for lambda_cap.
  min_candidates_per_cluster: 2
  # Global hard cap on total candidates after pruning.
  max_total_candidates: 10000
  # Preservation rules
  preserve_anchors: true
  preserve_products: true

# Phase 4: Optimization backend and fallback
optimization:
  backend: auto        # auto | ortools | pulp | greedy
  time_limit_s: 300
  coverage_weight: 1000.0   # big-M lexicographic weight
  fallback_on_timeout: true
  # Greedy fallback knobs
  greedy_coverage_augment: true
  greedy_max_repair_iterations: 10

# Emit debug artifacts (candidate_summary.json, product_summary.json, pruning_summary.json, etc.)
debug: true
