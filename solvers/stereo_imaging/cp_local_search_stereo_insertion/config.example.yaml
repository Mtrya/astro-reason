# Example config for the CP/local-search stereo insertion solver.
#
# Copy this file into a config directory as config.yaml, or pass it directly to
# solve.sh as the config path.

# Candidate generation
# observation_duration_s: 6.0
# candidate_stride_s: 10
# access_discovery_step_s: 60.0
# max_candidates_per_target_per_sat: null

# Product library
# max_tri_products_per_target_access: 50
# pair_mc_samples: 100
# tri_mc_samples: 100
# tri_pair_edge_mc_samples: 80

# Greedy seed
# seed_only: false           # When true, emit seed solution directly (no local search)
# tri_stereo_seed_phase: true  # Enable tri-stereo upgrade pass after pair seed
# max_seed_products: null    # Optional cap on number of products in the seed
# pair_weight: 1.0           # Weight multiplier for pair-stereo products in seed ranking
# tri_weight: 1.5            # Weight multiplier for tri-stereo products in seed ranking

# Local search
# max_passes: 10             # Maximum number of local-search passes over the seed
# max_moves_per_pass: 500    # Move-attempt budget per pass
# max_time_seconds: 120.0    # Hard time limit for local search
# enable_repair: true        # Enable remove-then-repair (swap) moves
# repair_candidates_limit: 20  # Max candidates to try after removing a product

# Debug artifacts
# debug: false
