# Example config for the CP/local-search stereo insertion solver.
#
# Copy this file into a config directory as config.yaml, or pass it directly to
# solve.sh as the config path.

# Candidate generation
# observation_duration_s: 6.0
# candidate_stride_s: 10
# access_discovery_step_s: 60.0
# max_candidates_per_target_per_sat: null

# Product library
# max_tri_products_per_target_access: 50
# pair_mc_samples: 100
# tri_mc_samples: 100
# tri_pair_edge_mc_samples: 80

# Greedy seed
# seed_only: false           # When true, emit seed solution directly (no local search)
# tri_first: true            # Prefer tri-stereo over pairs for already-covered targets
# max_seed_products: null    # Optional cap on number of products in the seed
# coverage_bonus: 10.0       # Additive bonus for products covering an uncovered target
# scarcity_weight: 1.0       # Weight on inverse of remaining feasible products per target
# tri_bonus: 0.5             # Additive bonus for tri-stereo products

# Debug artifacts
# debug: false
