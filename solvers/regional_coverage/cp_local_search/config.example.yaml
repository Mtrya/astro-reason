# Example configuration for the regional_coverage CP/local-search solver.
#
# Copy this file into a config directory as config.yaml, pass it directly to
# solve.sh as the config path, or let experiments/main_solver provide its
# experiment-owned config directory.
#
# Recommended quick smoke envelope:
#
# search_restart_count: 1
# search_run_seeds: [0]
# local_search_enabled: true
# local_search_max_iterations: 2
# local_search_max_neighborhoods_per_iteration: 24
# local_search_max_neighborhood_candidates: 40
# cp_enabled: true
# cp_backend: ortools_cp_sat
# cp_max_calls: 32
# cp_max_candidates: 10
# cp_time_limit_s: 0.25
#
# Current reproduction comparison envelope:
#
# search_restart_count: 3
# search_run_seeds: [0, 1, 2]
# greedy_random_choice_probability: 0.05
# local_search_enabled: true
# local_search_max_iterations: 8
# local_search_wall_time_limit_s: 8.0
# local_search_max_neighborhoods_per_iteration: 64
# local_search_max_neighborhood_candidates: 60
# local_search_randomize_neighborhood_order: true
# cp_enabled: true
# cp_backend: ortools_cp_sat
# cp_max_calls: 64
# cp_max_candidates: 10
# cp_max_conflicts: 2048
# cp_time_limit_s: 0.25
#
# These settings are intentionally still bounded. They are useful for audited
# comparison, not proof that the final faithful-reproduction compute envelope
# has been reached.

# ---------------------------------------------------------------------------
# Candidate generation
# ---------------------------------------------------------------------------
# candidate_stride_s: 600
# roll_samples_per_side: 3
# max_candidates_per_satellite: 256
# include_zero_coverage_candidates: true
# max_zero_coverage_candidates_per_satellite: 8
# candidate_debug_limit: 250

# ---------------------------------------------------------------------------
# Search restarts
# ---------------------------------------------------------------------------
# search_restart_count: 1
# search_seed: 0
# search_run_seeds: [0]
# search_wall_time_limit_s: null

# ---------------------------------------------------------------------------
# Greedy insertion
# ---------------------------------------------------------------------------
# greedy_policy: best_marginal_coverage
#   Choices:
#     - best_marginal_coverage
#     - coverage_per_transition_burden
#     - coverage_per_imaging_time
# greedy_max_iterations: null
# greedy_wall_time_limit_s: null
# greedy_random_choice_probability: 0.0
# greedy_random_seed: null

# ---------------------------------------------------------------------------
# Local search neighborhoods
# ---------------------------------------------------------------------------
# local_search_enabled: true
# local_search_max_iterations: 2
# local_search_wall_time_limit_s: null
# local_search_component_gap_s: 3600
# local_search_time_padding_s: 1200
# local_search_max_neighborhoods_per_iteration: 24
# local_search_max_neighborhood_candidates: 40
# local_search_randomize_neighborhood_order: false
# local_search_random_seed: null

# ---------------------------------------------------------------------------
# OR-Tools CP-SAT neighborhood repair
# ---------------------------------------------------------------------------
# The only supported CP backend is the solver-local OR-Tools CP-SAT dependency
# installed by setup.sh. The model repairs bounded fixed-start neighborhoods; it
# is not Tempo and does not continuously reschedule action start times.
# cp_enabled: true
# cp_backend: ortools_cp_sat
# cp_max_calls: 32
# cp_max_candidates: 10
# cp_max_conflicts: 2048
# cp_time_limit_s: 0.25
# cp_min_improvement_weight_m2: 0.000001

# ---------------------------------------------------------------------------
# Debug artifacts
# ---------------------------------------------------------------------------
# write_insertion_attempts: false
# insertion_attempt_debug_limit: 2000
# write_local_search_moves: false
# local_search_move_debug_limit: 1000
