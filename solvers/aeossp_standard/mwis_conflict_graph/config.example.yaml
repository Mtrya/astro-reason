# Example config for the AEOSSP MWIS conflict-graph solver.
#
# Copy this file into a config directory as config.yaml, or pass it directly to
# solve.sh as the config path.

# Candidate generation
# candidate_stride_multiplier: 1
# max_candidates: null
# max_candidates_per_task: null

# Graph selection policy
# selection_policy: weight_degree_end
# max_exact_component_size: 20

# Bounded refinement on larger components
# max_local_passes: 8
# population_size: 4
# recombination_rounds: 6

# Optional incumbent-refinement budget, in seconds.
# This only bounds the refinement search, not total solve time.
# time_limit_s: null

# Solver-local repair
# max_repair_iterations: 200

# Debug artifacts
# debug: false
