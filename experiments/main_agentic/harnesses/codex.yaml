harness: codex
runtime: base

config:
  target: home/.codex/config.toml
  real_file: experiments/_fragments/configs/codex/config.toml
  example_file: experiments/_fragments/configs/codex/config.toml.example

commands:
  headless_shell_command: >-
    codex exec --dangerously-bypass-approvals-and-sandbox
    --skip-git-repo-check
    --cd /app/workspace
    "$(cat ~/PROMPT.md)"
  interactive_command:
    - codex

artifacts:
  collect:
    - source: home/.codex/sessions
      target: session_logs/sessions
    - source: home/.codex/session_index.jsonl
      target: session_logs/session_index.jsonl
    - source: home/.codex/history.jsonl
      target: session_logs/history.jsonl
    - source: home/.codex/log
      target: session_logs/log

notes:
  - Codex keeps additional state in sqlite files under home/.codex; keep those out of default collected artifacts unless a follow-up phase needs lower-level debugging.
  - The dangerous bypass flag is intentional here because the outer Docker runtime is the actual sandbox boundary for this family.
