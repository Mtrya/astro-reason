harness: claude_code
runtime: base

config:
  target: home/.claude/settings.json
  real_file: experiments/_fragments/configs/claude_code/settings.json
  example_file: experiments/_fragments/configs/claude_code/settings.json.example

commands:
  headless_shell_command: >-
    claude -p --dangerously-skip-permissions
    --output-format text
    "$(cat ~/PROMPT.md)"
  interactive_command:
    - claude
    - --dangerously-skip-permissions

artifacts:
  collect:
    - source: home/.claude/projects
      target: session_logs/projects
    - source: home/.claude/tasks
      target: session_logs/tasks
    - source: home/.claude/history.jsonl
      target: session_logs/history.jsonl

notes:
  - Claude Code stores additional per-session state under home/.claude/session-env and home/.claude/sessions; collect more later if a run needs deeper replay artifacts.
  - Provider and auth details should stay in the real settings file or environment rather than in tracked configs.
