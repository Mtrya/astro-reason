harness: opencode
runtime: base

config:
  target: xdg_config/opencode/opencode.json
  real_file: experiments/_fragments/configs/opencode_default/opencode.json
  example_file: experiments/_fragments/configs/opencode_default/opencode.json.example

commands:
  headless_shell_command: >-
    opencode run --dangerously-skip-permissions "$(cat ~/PROMPT.md)"
  interactive_command:
    - opencode

artifacts:
  collect:
    - source: xdg_data/opencode
      target: session_logs

notes:
  - OpenCode is the cleanest current reference harness because it respects XDG paths cleanly inside the prepared runtime.
