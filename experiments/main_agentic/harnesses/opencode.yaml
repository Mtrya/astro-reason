# Partial working reference profile for OpenCode.
# This is the only harness profile that currently has a concrete config and
# command story, but it is still family-owned and may evolve in later phases.

harness: opencode
runtime: base

config:
  real_file: experiments/_fragments/configs/opencode_default/opencode.json
  example_file: experiments/_fragments/configs/opencode_default/opencode.json.example

commands:
  headless_shell_command: >-
    opencode run --dangerously-skip-permissions "$(cat ~/PROMPT.md)"
  interactive_command:
    - /bin/bash
    - -i

artifacts:
  collect:
    - source: xdg_data/opencode
      target: session_logs
