harness: kimi_cli
runtime: base

config:
  target: home/.kimi/config.toml
  real_file: experiments/_fragments/configs/kimi_cli/config.toml
  example_file: experiments/_fragments/configs/kimi_cli/config.toml.example

commands:
  headless_shell_command: >-
    kimi --print -p "$(cat ~/PROMPT.md)"
  interactive_command:
    - kimi

artifacts:
  collect:
    - source: home/.kimi/sessions
      target: session_logs/sessions
    - source: home/.kimi/user-history
      target: session_logs/user_history
    - source: home/.kimi/logs
      target: session_logs/logs
    - source: home/.kimi/kimi.json
      target: session_logs/kimi.json

notes:
  - Kimi print mode is the canonical non-interactive path and implicitly enables auto-approval.
  - Kimi also keeps credential material under home/.kimi/credentials; do not collect that by default.
