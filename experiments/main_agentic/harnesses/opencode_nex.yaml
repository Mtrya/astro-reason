harness: opencode_nex
runtime: base

config:
  target: xdg_config/opencode/opencode.json
  real_file: experiments/_fragments/configs/opencode_nex/opencode.json
  example_file: experiments/_fragments/configs/opencode_nex/opencode.json.example

commands:
  headless_shell_command: >-
    opencode run --dangerously-skip-permissions "$(cat ~/PROMPT.md)"
  interactive_command:
    - opencode

artifacts:
  collect:
    - source: xdg_data/opencode
      target: session_logs

notes:
  - OpenCode Nex uses the shared OpenCode runtime path with a Nex-flavored local config.
