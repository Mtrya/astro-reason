benchmark: relay_constellation

prompts:
  readme: experiments/_fragments/prompts/relay_constellation/README.default.md
  prompt: experiments/_fragments/prompts/relay_constellation/PROMPT.default.md

workspace:
  assemble:
    - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
      target: workspace/case
    - source: benchmarks/{benchmark}/verifier
      target: workspace/verifier

aggregation:
  verifier_kind: module_directory
  score_metrics:
    - name: service_fraction
      path: metrics.service_fraction
      direction: maximize
      role: primary
    - name: worst_demand_service_fraction
      path: metrics.worst_demand_service_fraction
      direction: maximize
      role: secondary
    - name: latency_p95_ms
      path: metrics.latency_p95_ms
      direction: minimize
      role: secondary
    - name: mean_latency_ms
      path: metrics.mean_latency_ms
      direction: minimize
      role: secondary
    - name: num_added_satellites
      path: metrics.num_added_satellites
      direction: minimize
      role: secondary
