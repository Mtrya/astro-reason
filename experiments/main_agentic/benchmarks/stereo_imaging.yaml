benchmark: stereo_imaging

prompts:
  readme: experiments/_fragments/prompts/stereo_imaging/README.default.md
  prompt: experiments/_fragments/prompts/stereo_imaging/PROMPT.default.md

workspace:
  assemble:
    - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
      target: workspace/case
    - source: benchmarks/{benchmark}/verifier
      target: workspace/verifier

aggregation:
  verifier_kind: module_directory
  score_metrics:
    - name: coverage_ratio
      path: metrics.coverage_ratio
      direction: maximize
      role: primary
    - name: normalized_quality
      path: metrics.normalized_quality
      direction: maximize
      role: secondary
