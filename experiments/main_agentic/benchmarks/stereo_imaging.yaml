benchmark: stereo_imaging

assemble:
  - source: experiments/_fragments/prompts/stereo_imaging/README.default.md
    target: /app/workspace/README.md
    render: true
  - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
    target: /app/workspace/case
  - source: experiments/_fragments/opaque_verifiers/artifacts/{benchmark}/verifier
    target: /app/workspace/verifier
  - source: experiments/_fragments/prompts/stereo_imaging/PROMPT.default.md
    target: /home/korolev/PROMPT.md
    render: true

collect: []

aggregation:
  verifier_kind: module_directory
  score_metrics:
    - name: coverage_ratio
      path: metrics.coverage_ratio
      direction: maximize
      role: primary
    - name: normalized_quality
      path: metrics.normalized_quality
      direction: maximize
      role: secondary
