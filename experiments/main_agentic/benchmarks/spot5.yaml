benchmark: spot5

assemble:
  - source: experiments/_fragments/prompts/spot5/README.default.md
    target: /app/workspace/README.md
    render: true
  - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
    target: /app/workspace/case
  - source: benchmarks/{benchmark}/verifier.py
    target: /app/workspace/verifier.py
  - source: experiments/_fragments/prompts/spot5/PROMPT.default.md
    target: /home/korolev/PROMPT.md
    render: true

collect: []

aggregation:
  verifier_kind: single_file
  score_metrics:
    - name: computed_profit
      path: metrics.computed_profit
      direction: maximize
      role: primary
    - name: computed_weight
      path: metrics.computed_weight
      direction: minimize
      role: secondary
    - name: computed_selected
      path: metrics.computed_selected
      direction: maximize
      role: secondary
