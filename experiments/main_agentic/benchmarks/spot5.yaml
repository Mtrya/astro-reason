benchmark: spot5

prompts:
  readme: experiments/_fragments/prompts/spot5/README.default.md
  prompt: experiments/_fragments/prompts/spot5/PROMPT.default.md

workspace:
  assemble:
    - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
      target: workspace/case
    - source: benchmarks/{benchmark}/verifier.py
      target: workspace/verifier.py

aggregation:
  verifier_kind: single_file
  score_metrics:
    - name: computed_profit
      path: metrics.computed_profit
      direction: maximize
      role: primary
    - name: computed_weight
      path: metrics.computed_weight
      direction: minimize
      role: secondary
    - name: computed_selected
      path: metrics.computed_selected
      direction: maximize
      role: secondary
