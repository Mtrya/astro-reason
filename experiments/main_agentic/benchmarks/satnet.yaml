benchmark: satnet

prompts:
  readme: experiments/_fragments/prompts/satnet/README.default.md
  prompt: experiments/_fragments/prompts/satnet/PROMPT.default.md

workspace:
  assemble:
    - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
      target: workspace/case
    - source: benchmarks/{benchmark}/verifier.py
      target: workspace/verifier.py

aggregation:
  verifier_kind: single_file
  score_metrics:
    - name: score_hours
      path: metrics.score_hours
      direction: maximize
      role: primary
    - name: n_satisfied_requests
      path: metrics.n_satisfied_requests
      direction: maximize
      role: secondary
    - name: u_rms
      path: metrics.u_rms
      direction: minimize
      role: secondary
    - name: u_max
      path: metrics.u_max
      direction: minimize
      role: secondary
    - name: n_tracks
      path: metrics.n_tracks
      direction: maximize
      role: secondary
