benchmark: satnet

assemble:
  - source: experiments/_fragments/prompts/satnet/README.default.md
    target: /app/workspace/README.md
    render: true
  - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
    target: /app/workspace/case
  - source: experiments/_fragments/opaque_verifiers/artifacts/{benchmark}/verifier
    target: /app/workspace/verifier
  - source: experiments/_fragments/prompts/satnet/PROMPT.default.md
    target: /home/korolev/PROMPT.md
    render: true

collect: []

aggregation:
  verifier_kind: single_file
  score_metrics:
    - name: score_hours
      path: metrics.score_hours
      direction: maximize
      role: primary
    - name: n_satisfied_requests
      path: metrics.n_satisfied_requests
      direction: maximize
      role: secondary
    - name: u_rms
      path: metrics.u_rms
      direction: minimize
      role: secondary
    - name: u_max
      path: metrics.u_max
      direction: minimize
      role: secondary
    - name: n_tracks
      path: metrics.n_tracks
      direction: maximize
      role: secondary
