benchmark: aeossp_standard

prompts:
  readme: experiments/_fragments/prompts/aeossp_standard/README.default.md
  prompt: experiments/_fragments/prompts/aeossp_standard/PROMPT.default.md

workspace:
  assemble:
    - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
      target: workspace/case
    - source: benchmarks/{benchmark}/verifier
      target: workspace/verifier

aggregation:
  verifier_kind: module_directory
  score_metrics:
    - name: WCR
      path: metrics.WCR
      direction: maximize
      role: primary
    - name: CR
      path: metrics.CR
      direction: maximize
      role: secondary
    - name: TAT
      path: metrics.TAT
      direction: minimize
      role: secondary
    - name: PC
      path: metrics.PC
      direction: minimize
      role: secondary
