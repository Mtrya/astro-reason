benchmark: aeossp_standard

assemble:
  - source: experiments/_fragments/prompts/aeossp_standard/README.default.md
    target: /app/workspace/README.md
    render: true
  - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
    target: /app/workspace/case
  - source: experiments/_fragments/opaque_verifiers/artifacts/{benchmark}/verifier
    target: /app/workspace/verifier
  - source: experiments/_fragments/prompts/aeossp_standard/PROMPT.default.md
    target: /home/korolev/PROMPT.md
    render: true

collect: []

aggregation:
  verifier_kind: module_directory
  score_metrics:
    - name: WCR
      path: metrics.WCR
      direction: maximize
      role: primary
    - name: CR
      path: metrics.CR
      direction: maximize
      role: secondary
    - name: TAT
      path: metrics.TAT
      direction: minimize
      role: secondary
    - name: PC
      path: metrics.PC
      direction: minimize
      role: secondary
