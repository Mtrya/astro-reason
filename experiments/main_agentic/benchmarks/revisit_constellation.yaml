benchmark: revisit_constellation

assemble:
  - source: experiments/_fragments/prompts/revisit_constellation/README.default.md
    target: /app/workspace/README.md
    render: true
  - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
    target: /app/workspace/case
  - source: experiments/_fragments/opaque_verifiers/artifacts/{benchmark}/verifier
    target: /app/workspace/verifier
  - source: experiments/_fragments/prompts/revisit_constellation/PROMPT.default.md
    target: /home/korolev/PROMPT.md
    render: true

collect: []

aggregation:
  verifier_kind: module_directory
  score_metrics:
    - name: capped_max_revisit_gap_hours
      path: metrics.capped_max_revisit_gap_hours
      direction: minimize
      role: primary
    - name: num_satellites
      path: metrics.num_satellites
      direction: minimize
      role: secondary
