benchmark: revisit_constellation

prompts:
  readme: experiments/_fragments/prompts/revisit_constellation/README.default.md
  prompt: experiments/_fragments/prompts/revisit_constellation/PROMPT.default.md

workspace:
  assemble:
    - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
      target: workspace/case
    - source: benchmarks/{benchmark}/verifier
      target: workspace/verifier

aggregation:
  verifier_kind: module_directory
  score_metrics:
    - name: max_revisit_gap_hours
      path: metrics.max_revisit_gap_hours
      direction: minimize
      role: primary
    - name: mean_revisit_gap_hours
      path: metrics.mean_revisit_gap_hours
      direction: minimize
      role: secondary
    - name: satellite_count
      path: metrics.satellite_count
      direction: minimize
      role: secondary
  flag_metrics:
    - name: threshold_satisfied
      path: metrics.threshold_satisfied
