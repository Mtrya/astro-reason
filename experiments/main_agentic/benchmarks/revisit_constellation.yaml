benchmark: revisit_constellation

assemble:
  - source: experiments/_fragments/prompts/revisit_constellation/README.default.md
    target: /app/workspace/README.md
    render: true
  - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
    target: /app/workspace/case
  - source: benchmarks/{benchmark}/verifier
    target: /app/workspace/verifier
  - source: experiments/_fragments/prompts/revisit_constellation/PROMPT.default.md
    target: /home/korolev/PROMPT.md
    render: true

collect: []

aggregation:
  verifier_kind: module_directory
  score_metrics:
    - name: max_revisit_gap_hours
      path: metrics.max_revisit_gap_hours
      direction: minimize
      role: primary
    - name: mean_revisit_gap_hours
      path: metrics.mean_revisit_gap_hours
      direction: minimize
      role: secondary
    - name: satellite_count
      path: metrics.satellite_count
      direction: minimize
      role: secondary
  flag_metrics:
    - name: threshold_satisfied
      path: metrics.threshold_satisfied
