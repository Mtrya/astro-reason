benchmark: regional_coverage

assemble:
  - source: experiments/_fragments/prompts/regional_coverage/README.default.md
    target: /app/workspace/README.md
    render: true
  - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
    target: /app/workspace/case
  - source: benchmarks/{benchmark}/verifier.py
    target: /app/workspace/verifier.py
  - source: experiments/_fragments/prompts/regional_coverage/PROMPT.default.md
    target: /home/korolev/PROMPT.md
    render: true

collect: []

aggregation:
  verifier_kind: single_file
  score_metrics:
    - name: coverage_ratio
      path: metrics.coverage_ratio
      direction: maximize
      role: primary
    - name: weighted_coverage_ratio
      path: metrics.weighted_coverage_ratio
      direction: maximize
      role: secondary
    - name: num_actions
      path: metrics.num_actions
      direction: minimize
      role: secondary
    - name: min_battery_wh
      path: metrics.min_battery_wh
      direction: maximize
      role: secondary
