benchmark: regional_coverage

prompts:
  readme: experiments/_fragments/prompts/regional_coverage/README.default.md
  prompt: experiments/_fragments/prompts/regional_coverage/PROMPT.default.md

workspace:
  assemble:
    - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
      target: workspace/case
    - source: benchmarks/{benchmark}/verifier.py
      target: workspace/verifier.py

aggregation:
  verifier_kind: single_file
  score_metrics:
    - name: coverage_ratio
      path: metrics.coverage_ratio
      direction: maximize
      role: primary
    - name: covered_weight_m2_equivalent
      path: metrics.covered_weight_m2_equivalent
      direction: maximize
      role: secondary
    - name: total_imaging_energy_wh
      path: metrics.total_imaging_energy_wh
      direction: minimize
      role: secondary
    - name: total_slew_angle_deg
      path: metrics.total_slew_angle_deg
      direction: minimize
      role: secondary
    - name: num_actions
      path: metrics.num_actions
      direction: minimize
      role: secondary
