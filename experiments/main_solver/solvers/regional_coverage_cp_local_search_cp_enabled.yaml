id: regional_coverage_cp_local_search_cp_enabled
benchmark: regional_coverage
solver: cp_local_search
solver_path: solvers/regional_coverage/cp_local_search
evidence_type: reproduced_solver
runnable: true
setup_script: setup.sh
solve_script: solve.sh
solution_filename: solution.json
config:
  cp_enabled: true
  cp_backend: ortools_cp_sat
  cp_max_calls: 64
  cp_max_candidates: 10
  cp_max_conflicts: 2048
  cp_time_limit_s: 0.25
  search_restart_count: 3
  search_run_seeds:
    - 0
    - 1
    - 2
  greedy_random_choice_probability: 0.05
  local_search_enabled: true
  local_search_max_iterations: 8
  local_search_wall_time_limit_s: 8.0
  local_search_max_neighborhoods_per_iteration: 64
  local_search_max_neighborhood_candidates: 60
  local_search_randomize_neighborhood_order: true
cases:
  - id: test/case_0001
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0001
  - id: test/case_0002
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0002
  - id: test/case_0003
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0003
  - id: test/case_0004
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0004
  - id: test/case_0005
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0005
verifier:
  command:
    - uv
    - run
    - python
    - benchmarks/regional_coverage/verifier.py
    - "{case_dir}"
    - "{solution_path}"
