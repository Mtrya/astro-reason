id: regional_coverage_celf_submodular
benchmark: regional_coverage
solver: celf_submodular
solver_path: solvers/regional_coverage/celf_submodular
evidence_type: reproduced_solver
runnable: true
setup_script: setup.sh
solve_script: solve.sh
solution_filename: solution.json
config:
  candidate_generation:
    time_stride_s: 600
    max_candidates_total: 512
    cap_strategy: balanced_stride
    debug_candidate_limit: 50
  coverage_mapping:
    method: indexed
    spatial_bin_deg: 0.25
  selection:
    schedule_aware: true
    compute_online_bounds: true
    max_bound_order_debug: 50
    write_iteration_trace: true
    max_iteration_debug: 2000
run_policies:
  smoke:
    description: Fast validity smoke with bounded debug artifacts.
    quality_envelope:
      level: contract_smoke
      status: NOT_QUALITY_FAIR
      claim: proves runnable verifier-valid solver contract only
      non_humble_parameters: false
    cases:
      - test/case_0001
    config:
      candidate_generation:
        time_stride_s: 600
        max_candidates_total: 512
        cap_strategy: balanced_stride
        debug_candidate_limit: 50
      coverage_mapping:
        method: indexed
        spatial_bin_deg: 0.25
      selection:
        schedule_aware: true
        compute_online_bounds: true
        max_bound_order_debug: 50
        write_iteration_trace: true
        max_iteration_debug: 2000
    quality_gates:
      requires_valid_verifier: true
      min_candidate_count: 512
      min_nonzero_candidate_count: 1
      min_repaired_actions: 1
      max_solver_total_seconds: 30
      max_verifier_seconds: 60
  evaluation:
    description: Promoted fixed-candidate CELF evaluation envelope with verifier and bound evidence.
    quality_envelope:
      level: reproduction
      status: NOT_YET_QUALITY_FAIR
      claim: faithful fixed-candidate CELF reproduction, but candidate cap remains humble for quality evidence
      non_humble_parameters: false
      blocker_summary:
        - 2048 candidates is small relative to the 85k-171k full candidate grids.
        - Historical evaluation artifacts have only 2-7 nonzero candidates per case.
        - Larger schedule-aware quality probes improve score, but remain below the documented quality target on case_0001.
    cases:
      - test/case_0001
      - test/case_0002
      - test/case_0003
      - test/case_0004
      - test/case_0005
    config:
      candidate_generation:
        time_stride_s: 600
        max_candidates_total: 2048
        cap_strategy: balanced_stride
        debug_candidate_limit: 25
      coverage_mapping:
        method: indexed
        spatial_bin_deg: 0.25
      selection:
        schedule_aware: true
        compute_online_bounds: true
        max_bound_order_debug: 50
        write_iteration_trace: false
        max_iteration_debug: 500
    quality_gates:
      requires_valid_verifier: true
      min_candidate_count: 2048
      min_nonzero_candidate_count: 1
      min_repaired_actions: 1
      max_solver_total_seconds: 60
      max_verifier_seconds: 90
  debug_diagnostics:
    description: Larger candidate coverage diagnostics with bounded CELF trace.
    quality_envelope:
      level: reproduction_debug
      status: NOT_QUALITY_FAIR
      claim: debug trace for reproduction diagnostics, not quality evidence
      non_humble_parameters: false
    cases:
      - test/case_0001
    config:
      candidate_generation:
        time_stride_s: 600
        max_candidates_total: 2048
        cap_strategy: balanced_stride
        debug_candidate_limit: 100
      coverage_mapping:
        method: indexed
        spatial_bin_deg: 0.25
      selection:
        schedule_aware: true
        compute_online_bounds: true
        max_bound_order_debug: 100
        write_iteration_trace: true
        max_iteration_debug: 1000
    quality_gates:
      requires_valid_verifier: true
      min_candidate_count: 2048
      min_nonzero_candidate_count: 1
      min_repaired_actions: 1
      max_solver_total_seconds: 90
      max_verifier_seconds: 90
  quality_probe_32768:
    description: Schedule-aware quality-envelope probe with a larger fixed candidate cap on the smoke case.
    quality_envelope:
      level: quality_diagnostic
      status: NOT_YET_QUALITY_FAIR
      claim: schedule-aware fixed-candidate probe; verifier-valid but still below the documented quality target
      non_humble_parameters: diagnostic_only
      expected_blocker: schedule-aware CELF may still be limited by fixed candidate density and geometry drift
    cases:
      - test/case_0001
    config:
      candidate_generation:
        time_stride_s: 600
        max_candidates_total: 32768
        cap_strategy: balanced_stride
        debug_candidate_limit: 10
      coverage_mapping:
        method: indexed
        spatial_bin_deg: 0.25
      selection:
        schedule_aware: true
        compute_online_bounds: true
        max_bound_order_debug: 20
        write_iteration_trace: false
        max_iteration_debug: 200
    quality_gates:
      requires_valid_verifier: true
      min_candidate_count: 32768
      min_nonzero_candidate_count: 50
      min_repaired_actions: 20
      max_solver_total_seconds: 90
      max_verifier_seconds: 90
  quality_probe_65536:
    description: Larger schedule-aware quality-envelope probe for candidate scaling limits on the smoke case.
    quality_envelope:
      level: quality_diagnostic
      status: NOT_YET_QUALITY_FAIR
      claim: strongest current schedule-aware probe; verifier-valid but still below the documented quality target
      non_humble_parameters: diagnostic_only
      expected_blocker: coverage mapping runtime plus remaining fixed-candidate schedule/geometry limits
    cases:
      - test/case_0001
    config:
      candidate_generation:
        time_stride_s: 600
        max_candidates_total: 65536
        cap_strategy: balanced_stride
        debug_candidate_limit: 5
      coverage_mapping:
        method: indexed
        spatial_bin_deg: 0.25
      selection:
        schedule_aware: true
        compute_online_bounds: true
        max_bound_order_debug: 10
        write_iteration_trace: false
        max_iteration_debug: 100
    quality_gates:
      requires_valid_verifier: true
      min_candidate_count: 65536
      min_nonzero_candidate_count: 100
      min_repaired_actions: 20
      max_solver_total_seconds: 120
      max_verifier_seconds: 90
cases:
  - id: test/case_0001
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0001
  - id: test/case_0002
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0002
  - id: test/case_0003
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0003
  - id: test/case_0004
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0004
  - id: test/case_0005
    case_dir: benchmarks/regional_coverage/dataset/cases/test/case_0005
verifier:
  command:
    - uv
    - run
    - python
    - benchmarks/regional_coverage/verifier.py
    - "{case_dir}"
    - "{solution_path}"
