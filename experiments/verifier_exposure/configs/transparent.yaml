exposure: transparent

workspace_verifier:
  exposed: true
  kind: readable_source
  location: verifier/
  command: python -m verifier.run case/ solution.json

assemble:
  - source: experiments/_fragments/prompts/relay_constellation/README.default.md
    target: /app/workspace/README.md
    render: true
  - source: benchmarks/{benchmark}/dataset/cases/{split}/{case_id}
    target: /app/workspace/case
  - source: benchmarks/{benchmark}/verifier
    target: /app/workspace/verifier
  - source: experiments/_fragments/prompts/relay_constellation/PROMPT.default.md
    target: /home/korolev/PROMPT.md
    render: true
  - source: experiments/_fragments/prompts/_shared/AGENTS.main_agentic.default.md
    target: /app/workspace/AGENTS.md
    render: true
